version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        patterns:
          - "@types/*"
          - "@eslint/*"
          - "eslint*"
          - "typescript*"
          - "vitest*"
          - "tsup"
          - "tsx"
          - "prettier"
      runtime-dependencies:
        patterns:
          - "fflate"
          - "js-yaml"
          - "zod"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:15"
      timezone: "UTC"
    open-pull-requests-limit: 10
